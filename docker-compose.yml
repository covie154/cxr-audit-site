# ================================
# 🫁 PRIMER-LLM — Docker Compose
# Three services: nginx (HTTPS), django (Gunicorn), api (FastAPI)
# ================================

services:

  # ── Nginx reverse proxy (HTTPS termination) ──────────────
  nginx:
    image: nginx:alpine
    container_name: primed-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      django:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - primed-net

  # ── Django web app (Gunicorn + WhiteNoise) ───────────────
  django:
    build:
      context: ./django-app
      dockerfile: Dockerfile
    container_name: primed-django
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=lunit_audit.settings
      - CXR_API_IP=api
      - CXR_API_PORT=1221
    volumes:
      - django-db:/app/db
      - django-media:/app/media
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/login/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - primed-net

  # ── FastAPI analysis API (Uvicorn) ───────────────────────
  api:
    build:
      context: ./cxr-audit-api
      dockerfile: Dockerfile
    container_name: primed-api
    expose:
      - "1221"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    # Access the Ollama server running on the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:1221/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - primed-net

# ── Networks ──────────────────────────────────────────────
networks:
  primed-net:
    driver: bridge

# ── Persistent Volumes ────────────────────────────────────
volumes:
  django-db:
    driver: local
  django-media:
    driver: local
