# ================================
# 🫁 PRIMER-LLM — Docker Compose
# Three services: nginx (HTTPS), django (Gunicorn), api (FastAPI)
# ================================

name: cxr-audit-site

services:

  # ── Nginx reverse proxy (HTTPS termination) ──────────────
  nginx:
    image: nginx:alpine
    container_name: primer-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      django:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 100
    networks:
      - primer-public
      - primer-app

  # ── Django web app (Gunicorn + WhiteNoise) ───────────────
  django:
    build:
      context: ./django-app
      dockerfile: Dockerfile
    container_name: primer-django
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=lunit_audit.settings
      - CXR_API_IP=api
      - CXR_API_PORT=1221
      # Set DATABASE_ENGINE=postgres and AUDIT_DATABASE_ENGINE=postgres in .env
      # to use the postgres service below. SQLite remains the default otherwise.
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - AUDIT_DATABASE_HOST=${AUDIT_DATABASE_HOST:-postgres}
    volumes:
      - django-db:/app/db
      - django-media:/app/media
      - django-staticfiles:/app/staticfiles
      - django-audit-artifacts:/app/audit_artifacts
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/login/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
          pids: 200
    networks:
      - primer-app
      - primer-data

  # ── PostgreSQL database (optional via DATABASE_ENGINE=postgres) ─────
  postgres:
    image: postgres:16-alpine
    container_name: primer-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-primer_admin}
      - POSTGRES_USER=${POSTGRES_USER:-primer_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me-postgres-admin-password}
      - POSTGRES_APP_DB=${POSTGRES_APP_DB:-primer_app}
      - POSTGRES_APP_USER=${POSTGRES_APP_USER:-primer_app_user}
      - POSTGRES_APP_PASSWORD=${POSTGRES_APP_PASSWORD:-change-me-app-db-password}
      - POSTGRES_AUDIT_DB=${POSTGRES_AUDIT_DB:-primer_audit}
      - POSTGRES_AUDIT_USER=${POSTGRES_AUDIT_USER:-primer_audit_user}
      - POSTGRES_AUDIT_PASSWORD=${POSTGRES_AUDIT_PASSWORD:-change-me-audit-db-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
          pids: 200
    networks:
      - primer-data

  # ── FastAPI analysis API (Uvicorn) ───────────────────────
  api:
    build:
      context: ./cxr-audit-api
      dockerfile: Dockerfile
    container_name: primer-api
    expose:
      - "1221"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - API_REQUIRE_AUTH=${API_REQUIRE_AUTH:-true}
      - FASTAPI_CORS_ORIGINS=${FASTAPI_CORS_ORIGINS:-}
    # Access the Ollama server running on the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:1221/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
          pids: 200
    networks:
      - primer-app
      - primer-inference

# ── Networks ──────────────────────────────────────────────
networks:
  primer-public:
    driver: bridge
  primer-app:
    driver: bridge
    internal: true
  primer-data:
    driver: bridge
    internal: true
  primer-inference:
    driver: bridge

# ── Persistent Volumes ────────────────────────────────────
volumes:
  django-db:
  django-media:
  django-staticfiles:
  django-audit-artifacts:
  postgres-data:
